version: "3.9"

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  chroma_data:
    driver: local
